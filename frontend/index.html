<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina — Share the Moment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header>
    <div class="wordmark">Lumi<span>na</span></div>
    <div class="header-actions">
      <div id="user-status"></div>
      <button class="btn primary" id="upload-btn" style="display:none" onclick="openUpload()">+ Upload</button>
      <button class="btn" id="auth-btn" onclick="openAuth()">Sign In</button>
      <button class="btn danger" id="signout-btn" style="display:none" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- ── Main gallery ────────────────────────────────────────────── -->
  <main>
    <div class="gallery-header">
      <h1 class="gallery-title">Recent Moments</h1>
      <span class="gallery-count" id="photo-count"></span>
    </div>
    <div id="gallery" class="gallery-grid"></div>
  </main>

</div>

<!-- ── Auth Modal ──────────────────────────────────────────────────── -->
<div class="overlay" id="auth-overlay">
  <div class="modal">
    <div class="modal-title">Welcome Back</div>
    <div class="modal-sub">Access your account</div>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Register</button>
    </div>

    <!-- Sign In -->
    <div id="signin-form">
      <div class="field"><label>Email</label><input type="email" id="si-email" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="si-pass" placeholder="••••••••" /></div>
      <div class="form-error" id="si-error"></div>
      <div class="form-actions">
        <button class="btn" onclick="closeAuth()">Cancel</button>
        <button class="btn primary" onclick="doSignIn()">Sign In</button>
      </div>
    </div>

    <!-- Register -->
    <div id="signup-form" style="display:none">
      <div class="field"><label>Display Name</label><input type="text" id="su-name" placeholder="Your name" /></div>
      <div class="field"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="su-pass" placeholder="Min 8 chars, upper + number" /></div>
      <div class="form-error" id="su-error"></div>
      <div class="form-actions">
        <button class="btn" onclick="closeAuth()">Cancel</button>
        <button class="btn primary" onclick="doSignUp()">Create Account</button>
      </div>
    </div>

    <!-- Verify -->
    <div id="verify-form" style="display:none">
      <div class="modal-sub" style="margin-bottom:16px">Check your email for a verification code</div>
      <div class="field"><label>Verification Code</label><input type="text" id="verify-code" placeholder="123456" /></div>
      <div class="form-error" id="verify-error"></div>
      <div class="form-actions">
        <button class="btn primary" onclick="doVerify()">Verify &amp; Sign In</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Upload Modal ──────────────────────────────────────────────────── -->
<div class="overlay" id="upload-overlay">
  <div class="modal">
    <div class="modal-title">Share a Moment</div>
    <div class="modal-sub">Upload a photo to the community</div>

    <div class="upload-zone" id="drop-zone"
         onclick="document.getElementById('file-input').click()"
         ondragover="handleDrag(event,true)"
         ondragleave="handleDrag(event,false)"
         ondrop="handleDrop(event)">
      <div class="icon">&#x1F5BC;</div>
      <div class="hint">Click or drop an image here</div>
      <div class="filename" id="chosen-filename"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="fileChosen(this)" />

    <div class="field">
      <label>Caption (optional)</label>
      <textarea id="caption-input" placeholder="Describe this moment…"></textarea>
    </div>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Uploading…</div>
    </div>

    <div class="form-error" id="upload-error"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeUpload()">Cancel</button>
      <button class="btn primary" id="do-upload-btn" onclick="doUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- ── Lightbox ──────────────────────────────────────────────────── -->
<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close">✕</button>
  <img id="lb-img" src="" alt="" />
  <div class="lb-caption" id="lb-caption"></div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Scripts (load order matters) ──────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/upload.js"></script>
<script src="js/gallery.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
