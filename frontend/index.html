<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina — Share the Moment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a08;
      --surface: #111110;
      --border: #222220;
      --gold: #c8a96e;
      --gold-dim: #8a7148;
      --cream: #f0ece2;
      --cream-dim: #9a9690;
      --red: #c45c4a;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --radius: 2px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.02em;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(10,10,8,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .wordmark span { color: var(--cream-dim); }

    .header-actions { display: flex; gap: 12px; align-items: center; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--cream-dim);
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--gold-dim); color: var(--cream); }
    .btn.primary {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(200,169,110,0.06);
    }
    .btn.primary:hover {
      background: rgba(200,169,110,0.14);
      color: var(--cream);
    }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: rgba(196,92,74,0.12); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Modals ──────────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      width: min(480px, 92vw);
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-title {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 300;
      color: var(--gold);
      margin-bottom: 4px;
      letter-spacing: 0.06em;
    }
    .modal-sub {
      color: var(--cream-dim);
      margin-bottom: 28px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 20px;
      background: transparent;
      border: none;
      color: var(--cream-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── Form fields ─────────────────────────────────────────────── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--gold-dim); }
    .field textarea { resize: vertical; min-height: 72px; }

    .form-error {
      color: var(--red);
      font-size: 11px;
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    .form-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* ── Upload Zone ─────────────────────────────────────────────── */
    .upload-zone {
      border: 1px dashed var(--border);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--gold-dim); background: rgba(200,169,110,0.04); }
    .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .upload-zone .hint { font-size: 11px; color: var(--cream-dim); letter-spacing: 0.08em; }
    .upload-zone .filename { font-size: 12px; color: var(--gold); margin-top: 8px; }

    input[type="file"] { display: none; }

    /* ── Progress ────────────────────────────────────────────────── */
    .progress-wrap { margin-top: 12px; }
    .progress-bar-track {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--gold);
      transition: width 0.3s;
      width: 0%;
    }
    .progress-label { font-size: 11px; color: var(--cream-dim); margin-top: 6px; }

    /* ── Notification ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 24px;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--cream);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: var(--gold-dim); color: var(--gold); }
    #toast.error   { border-color: var(--red); color: var(--red); }

    /* ── Gallery ─────────────────────────────────────────────────── */
    main { flex: 1; padding: 40px 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

    .gallery-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 32px;
    }
    .gallery-title {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .gallery-count {
      font-size: 11px;
      color: var(--cream-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .gallery-grid {
      columns: 3 280px;
      gap: 12px;
    }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      animation: fadein 0.5s ease both;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .photo-card img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }
    .photo-card:hover img { transform: scale(1.03); }

    .photo-meta {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
    }
    .photo-caption {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .photo-byline {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .photo-author { font-size: 10px; color: var(--cream-dim); letter-spacing: 0.1em; text-transform: uppercase; }
    .photo-date   { font-size: 10px; color: var(--cream-dim); }
    .delete-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(10,10,8,0.85);
      border: 1px solid var(--red);
      color: var(--red);
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.2s;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
    }
    .photo-card:hover .delete-btn { opacity: 1; }

    /* ── Lightbox ────────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; }
    #lightbox .lb-caption {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.04em;
    }
    #lightbox .lb-close {
      position: absolute;
      top: 20px; right: 28px;
      font-size: 24px;
      color: var(--cream-dim);
      cursor: pointer;
      background: none;
      border: none;
    }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-glyph {
      font-size: 64px;
      margin-bottom: 20px;
      filter: grayscale(1) opacity(0.4);
    }
    .empty-title {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: 0.06em;
    }
    .empty-sub {
      font-size: 11px;
      color: var(--cream-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0.6;
    }

    /* ── Skeleton ────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── User chip ───────────────────────────────────────────────── */
    .user-chip {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--cream-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      main   { padding: 24px 16px; }
      .wordmark { font-size: 20px; }
      .gallery-title { font-size: 30px; }
      .modal { padding: 28px 20px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header>
    <div class="wordmark">Lumi<span>na</span></div>
    <div class="header-actions">
      <div id="user-status"></div>
      <button class="btn primary" id="upload-btn" style="display:none" onclick="openUpload()">+ Upload</button>
      <button class="btn" id="auth-btn" onclick="openAuth()">Sign In</button>
      <button class="btn danger" id="signout-btn" style="display:none" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- ── Main gallery ────────────────────────────────────────────── -->
  <main>
    <div class="gallery-header">
      <h1 class="gallery-title">Recent Moments</h1>
      <span class="gallery-count" id="photo-count"></span>
    </div>
    <div id="gallery" class="gallery-grid"></div>
  </main>

</div>

<!-- ── Auth Modal ──────────────────────────────────────────────────── -->
<div class="overlay" id="auth-overlay">
  <div class="modal">
    <div class="modal-title">Welcome Back</div>
    <div class="modal-sub">Access your account</div>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Register</button>
    </div>

    <!-- Sign In -->
    <div id="signin-form">
      <div class="field"><label>Email</label><input type="email" id="si-email" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="si-pass" placeholder="••••••••" /></div>
      <div class="form-error" id="si-error"></div>
      <div class="form-actions">
        <button class="btn" onclick="closeAuth()">Cancel</button>
        <button class="btn primary" onclick="doSignIn()">Sign In</button>
      </div>
    </div>

    <!-- Register -->
    <div id="signup-form" style="display:none">
      <div class="field"><label>Display Name</label><input type="text" id="su-name" placeholder="Your name" /></div>
      <div class="field"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="su-pass" placeholder="Min 8 chars, upper + number" /></div>
      <div class="form-error" id="su-error"></div>
      <div class="form-actions">
        <button class="btn" onclick="closeAuth()">Cancel</button>
        <button class="btn primary" onclick="doSignUp()">Create Account</button>
      </div>
    </div>

    <!-- Verify -->
    <div id="verify-form" style="display:none">
      <div class="modal-sub" style="margin-bottom:16px">Check your email for a verification code</div>
      <div class="field"><label>Verification Code</label><input type="text" id="verify-code" placeholder="123456" /></div>
      <div class="form-error" id="verify-error"></div>
      <div class="form-actions">
        <button class="btn primary" onclick="doVerify()">Verify &amp; Sign In</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Upload Modal ──────────────────────────────────────────────────── -->
<div class="overlay" id="upload-overlay">
  <div class="modal">
    <div class="modal-title">Share a Moment</div>
    <div class="modal-sub">Upload a photo to the community</div>

    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="handleDrag(event,true)" ondragleave="handleDrag(event,false)" ondrop="handleDrop(event)">
      <div class="icon">&#x1F5BC;</div>
      <div class="hint">Click or drop an image here</div>
      <div class="filename" id="chosen-filename"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="fileChosen(this)" />

    <div class="field"><label>Caption (optional)</label><textarea id="caption-input" placeholder="Describe this moment…"></textarea></div>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Uploading…</div>
    </div>

    <div class="form-error" id="upload-error"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeUpload()">Cancel</button>
      <button class="btn primary" id="do-upload-btn" onclick="doUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- ── Lightbox ──────────────────────────────────────────────────── -->
<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close">✕</button>
  <img id="lb-img" src="" alt="" />
  <div class="lb-caption" id="lb-caption"></div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ── Config – injected at deploy time ────────────────────────────────────────
const CONFIG = {
  API_URL:       window.__API_URL__ || "",      // Lambda Function URL
  COGNITO_POOL:  window.__COGNITO_POOL__ || "",
  COGNITO_CLIENT:window.__COGNITO_CLIENT__ || "",
  AWS_REGION:    window.__AWS_REGION__ || "us-east-1",
};

// ── State ────────────────────────────────────────────────────────────────────
let accessToken = localStorage.getItem("lumina_access") || null;
let currentUser = null;
let pendingEmail = "";
let selectedFile = null;

// ── Cognito helpers ──────────────────────────────────────────────────────────
const COGNITO_URL = `https://cognito-idp.${CONFIG.AWS_REGION}.amazonaws.com/`;

async function cognitoReq(target, body) {
  const r = await fetch(COGNITO_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-amz-json-1.1",
      "X-Amz-Target": target,
    },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.message || data.__type || "Auth error");
  return data;
}

async function initUser() {
  if (!accessToken) return;
  try {
    const data = await cognitoReq("AWSCognitoIdentityProviderService.GetUser", { AccessToken: accessToken });
    const attrs = Object.fromEntries(data.UserAttributes.map(a => [a.Name, a.Value]));
    currentUser = { username: data.Username, email: attrs.email, nickname: attrs.nickname || data.Username };
    updateHeader();
  } catch {
    accessToken = null;
    localStorage.removeItem("lumina_access");
  }
}

// ── Auth UI ──────────────────────────────────────────────────────────────────
function openAuth()  { document.getElementById("auth-overlay").classList.add("open"); }
function closeAuth() { document.getElementById("auth-overlay").classList.remove("open"); }

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", (i===0&&tab==="signin")||(i===1&&tab==="signup")));
  document.getElementById("signin-form").style.display = tab === "signin" ? "" : "none";
  document.getElementById("signup-form").style.display = tab === "signup" ? "" : "none";
  document.getElementById("verify-form").style.display = "none";
}

async function doSignIn() {
  const email = document.getElementById("si-email").value.trim();
  const pass   = document.getElementById("si-pass").value;
  document.getElementById("si-error").textContent = "";
  try {
    const data = await cognitoReq("AWSCognitoIdentityProviderService.InitiateAuth", {
      AuthFlow: "USER_PASSWORD_AUTH",
      ClientId: CONFIG.COGNITO_CLIENT,
      AuthParameters: { USERNAME: email, PASSWORD: pass },
    });
    accessToken = data.AuthenticationResult.AccessToken;
    localStorage.setItem("lumina_access", accessToken);
    await initUser();
    closeAuth();
    toast("Welcome back!", "success");
    loadPhotos();
  } catch (e) {
    document.getElementById("si-error").textContent = e.message;
  }
}

async function doSignUp() {
  const name  = document.getElementById("su-name").value.trim();
  const email = document.getElementById("su-email").value.trim();
  const pass  = document.getElementById("su-pass").value;
  document.getElementById("su-error").textContent = "";
  try {
    await cognitoReq("AWSCognitoIdentityProviderService.SignUp", {
      ClientId: CONFIG.COGNITO_CLIENT,
      Username: email,
      Password: pass,
      UserAttributes: [
        { Name: "email", Value: email },
        { Name: "nickname", Value: name || email.split("@")[0] },
      ],
    });
    pendingEmail = email;
    document.getElementById("signup-form").style.display = "none";
    document.getElementById("verify-form").style.display = "";
  } catch (e) {
    document.getElementById("su-error").textContent = e.message;
  }
}

async function doVerify() {
  const code = document.getElementById("verify-code").value.trim();
  document.getElementById("verify-error").textContent = "";
  try {
    await cognitoReq("AWSCognitoIdentityProviderService.ConfirmSignUp", {
      ClientId: CONFIG.COGNITO_CLIENT,
      Username: pendingEmail,
      ConfirmationCode: code,
    });
    // Auto sign-in after verify — just close and ask to sign in
    document.getElementById("verify-form").style.display = "none";
    document.getElementById("signin-form").style.display = "";
    document.getElementById("si-email").value = pendingEmail;
    document.querySelectorAll(".tab")[0].click();
    toast("Account verified! Please sign in.", "success");
  } catch (e) {
    document.getElementById("verify-error").textContent = e.message;
  }
}

function signOut() {
  accessToken = null;
  currentUser = null;
  localStorage.removeItem("lumina_access");
  updateHeader();
  toast("Signed out.");
  loadPhotos();
}

function updateHeader() {
  const userStatus  = document.getElementById("user-status");
  const authBtn     = document.getElementById("auth-btn");
  const signoutBtn  = document.getElementById("signout-btn");
  const uploadBtn   = document.getElementById("upload-btn");

  if (currentUser) {
    userStatus.innerHTML = `<div class="user-chip"><span class="user-dot"></span>${currentUser.nickname}</div>`;
    authBtn.style.display     = "none";
    signoutBtn.style.display  = "";
    uploadBtn.style.display   = "";
  } else {
    userStatus.innerHTML = "";
    authBtn.style.display     = "";
    signoutBtn.style.display  = "none";
    uploadBtn.style.display   = "none";
  }
}

// ── Upload ───────────────────────────────────────────────────────────────────
function openUpload()  { selectedFile = null; document.getElementById("chosen-filename").textContent = ""; document.getElementById("caption-input").value = ""; document.getElementById("upload-error").textContent = ""; document.getElementById("progress-wrap").style.display = "none"; document.getElementById("upload-overlay").classList.add("open"); }
function closeUpload() { document.getElementById("upload-overlay").classList.remove("open"); }

function fileChosen(input) {
  selectedFile = input.files[0] || null;
  document.getElementById("chosen-filename").textContent = selectedFile ? selectedFile.name : "";
}

function handleDrag(e, on) {
  e.preventDefault();
  document.getElementById("drop-zone").classList.toggle("drag", on);
}

function handleDrop(e) {
  e.preventDefault();
  handleDrag(e, false);
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) {
    selectedFile = file;
    document.getElementById("chosen-filename").textContent = file.name;
  }
}

async function doUpload() {
  if (!selectedFile) { document.getElementById("upload-error").textContent = "Please select an image."; return; }
  const caption = document.getElementById("caption-input").value.trim();
  document.getElementById("upload-error").textContent = "";
  document.getElementById("do-upload-btn").disabled = true;

  try {
    // 1. Get pre-signed URL from our API
    const res = await apiFetch("POST", "/upload-url", { filename: selectedFile.name, content_type: selectedFile.type, caption });
    if (!res.ok) throw new Error((await res.json()).error || "Upload failed");
    const { upload_url } = await res.json();

    // 2. Upload directly to S3 with progress
    document.getElementById("progress-wrap").style.display = "";
    await uploadToS3(upload_url, selectedFile);

    closeUpload();
    toast("Photo shared!", "success");
    setTimeout(loadPhotos, 1200); // slight delay for S3 consistency
  } catch (e) {
    document.getElementById("upload-error").textContent = e.message;
  } finally {
    document.getElementById("do-upload-btn").disabled = false;
  }
}

function uploadToS3(url, file) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("PUT", url);
    xhr.setRequestHeader("Content-Type", file.type);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-label").textContent = `Uploading… ${pct}%`;
      }
    };
    xhr.onload  = () => xhr.status < 300 ? resolve() : reject(new Error("S3 upload failed"));
    xhr.onerror = () => reject(new Error("Network error during upload"));
    xhr.send(file);
  });
}

// ── API ──────────────────────────────────────────────────────────────────────
function apiFetch(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (accessToken) opts.headers["Authorization"] = `Bearer ${accessToken}`;
  if (body) opts.body = JSON.stringify(body);
  return fetch(CONFIG.API_URL + path, opts);
}

// ── Gallery ──────────────────────────────────────────────────────────────────
async function loadPhotos() {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = '<div class="skeleton" style="height:200px;width:100%;margin-bottom:12px"></div>'.repeat(6);

  try {
    const res = await apiFetch("GET", "/photos");
    if (!res.ok) throw new Error("Failed to load photos");
    const { photos } = await res.json();

    document.getElementById("photo-count").textContent = photos.length ? `${photos.length} photo${photos.length===1?"":"s"}` : "";

    if (!photos.length) {
      gallery.innerHTML = `
        <div class="empty" style="columns:unset">
          <div class="empty-glyph">&#x1F4F7;</div>
          <div class="empty-title">No photos yet</div>
          <div class="empty-sub">Be the first to share a moment</div>
        </div>`;
      return;
    }

    gallery.innerHTML = photos.map(p => photoCard(p)).join("");
  } catch (e) {
    gallery.innerHTML = `<div class="empty"><div class="empty-title" style="color:var(--red)">Could not load photos</div></div>`;
  }
}

function photoCard(p) {
  const date = new Date(p.uploaded_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  return `
    <div class="photo-card" onclick="openLightbox('${escHtml(p.image_url)}','${escHtml(p.caption)}')">
      <img src="${escHtml(p.image_url)}" alt="${escHtml(p.caption)}" loading="lazy" />
      ${currentUser ? `<button class="delete-btn" onclick="event.stopPropagation();deletePhoto('${p.photo_id}')">Delete</button>` : ""}
      <div class="photo-meta">
        ${p.caption ? `<div class="photo-caption">${escHtml(p.caption)}</div>` : ""}
        <div class="photo-byline">
          <span class="photo-author">${escHtml(p.nickname)}</span>
          <span class="photo-date">${date}</span>
        </div>
      </div>
    </div>`;
}

async function deletePhoto(photoId) {
  if (!confirm("Delete this photo?")) return;
  try {
    const res = await apiFetch("DELETE", `/photos/${photoId}`);
    if (!res.ok) throw new Error((await res.json()).error || "Delete failed");
    toast("Photo deleted.", "success");
    loadPhotos();
  } catch (e) {
    toast(e.message, "error");
  }
}

// ── Lightbox ─────────────────────────────────────────────────────────────────
function openLightbox(url, caption) {
  document.getElementById("lb-img").src = url;
  document.getElementById("lb-caption").textContent = caption;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = "", 3000);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await initUser();
  updateHeader();
  loadPhotos();
})();
</script>
